const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{

// ── TWEAKS PANEL ──────────────────────────────────────────────────────────────
const TWEAKS_CSS = `
  .twk-panel{position:fixed;right:16px;bottom:16px;z-index:2147483646;width:272px;max-height:calc(100vh - 32px);display:flex;flex-direction:column;background:rgba(250,249,247,.82);color:#29261b;-webkit-backdrop-filter:blur(24px) saturate(160%);backdrop-filter:blur(24px) saturate(160%);border:.5px solid rgba(255,255,255,.6);border-radius:14px;box-shadow:0 12px 40px rgba(0,0,0,.22);font:11.5px/1.4 ui-sans-serif,system-ui,sans-serif;overflow:hidden}
  .twk-hd{display:flex;align-items:center;justify-content:space-between;padding:10px 8px 10px 14px;cursor:move;user-select:none}
  .twk-hd b{font-size:12px;font-weight:600}
  .twk-x{appearance:none;border:0;background:transparent;color:rgba(41,38,27,.5);width:22px;height:22px;border-radius:6px;cursor:pointer;font-size:13px}
  .twk-x:hover{background:rgba(0,0,0,.07)}
  .twk-body{padding:4px 14px 14px;display:flex;flex-direction:column;gap:10px;overflow-y:auto;min-height:0}
  .twk-sect{font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:rgba(41,38,27,.4);padding-top:8px}
  .twk-row{display:flex;flex-direction:column;gap:4px}
  .twk-row-h{flex-direction:row;align-items:center;justify-content:space-between;gap:10px}
  .twk-lbl{font-weight:500;color:rgba(41,38,27,.7);display:flex;justify-content:space-between}
  .twk-val{color:rgba(41,38,27,.45);font-variant-numeric:tabular-nums}
  .twk-slider{appearance:none;-webkit-appearance:none;width:100%;height:4px;border-radius:99px;background:rgba(0,0,0,.12);outline:none;margin:4px 0}
  .twk-slider::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:#fff;border:.5px solid rgba(0,0,0,.15);box-shadow:0 1px 3px rgba(0,0,0,.2);cursor:pointer}
  .twk-toggle{position:relative;width:32px;height:18px;border:0;border-radius:99px;background:rgba(0,0,0,.15);transition:background .15s;cursor:pointer;padding:0;flex-shrink:0}
  .twk-toggle[data-on="1"]{background:#34c759}
  .twk-toggle i{position:absolute;top:2px;left:2px;width:14px;height:14px;border-radius:50%;background:#fff;box-shadow:0 1px 2px rgba(0,0,0,.25);transition:transform .15s;pointer-events:none}
  .twk-toggle[data-on="1"] i{transform:translateX(14px)}
  .twk-seg{position:relative;display:flex;padding:2px;border-radius:8px;background:rgba(0,0,0,.07);user-select:none}
  .twk-seg-thumb{position:absolute;top:2px;bottom:2px;border-radius:6px;background:rgba(255,255,255,.92);box-shadow:0 1px 2px rgba(0,0,0,.12);transition:left .15s,width .15s}
  .twk-seg button{position:relative;z-index:1;flex:1;border:0;background:transparent;color:inherit;font:inherit;font-weight:500;min-height:22px;border-radius:6px;cursor:pointer;padding:3px 6px}
  .twk-swatch{appearance:none;-webkit-appearance:none;width:52px;height:22px;border:.5px solid rgba(0,0,0,.12);border-radius:6px;padding:0;cursor:pointer;background:transparent;flex-shrink:0}
  .twk-swatch::-webkit-color-swatch-wrapper{padding:0}
  .twk-swatch::-webkit-color-swatch{border:0;border-radius:5px}
`;

function useTweaks(defaults) {
  const [values, setValues] = useState(defaults);
  const setTweak = useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' ? keyOrEdits : { [keyOrEdits]: val };
    setValues(prev => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
  }, []);
  return { tweaks: values, setTweak };
}

function TweaksPanel({ children, title = 'Tweaks' }) {
  const [open, setOpen] = useState(false);
  const ref = useRef(null);
  const off = useRef({ x: 16, y: 16 });
  useEffect(() => {
    const onMsg = e => {
      if (e?.data?.type === '__activate_edit_mode') setOpen(true);
      else if (e?.data?.type === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);
  const dismiss = () => { setOpen(false); window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*'); };
  const onDrag = e => {
    const el = ref.current; if (!el) return;
    const r = el.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY, sr = window.innerWidth - r.right, sb = window.innerHeight - r.bottom;
    const mv = ev => { off.current = { x: Math.max(8, sr-(ev.clientX-sx)), y: Math.max(8, sb-(ev.clientY-sy)) }; el.style.right = off.current.x+'px'; el.style.bottom = off.current.y+'px'; };
    const up = () => { window.removeEventListener('mousemove',mv); window.removeEventListener('mouseup',up); };
    window.addEventListener('mousemove',mv); window.addEventListener('mouseup',up);
  };
  if (!open) return null;
  return (
    <>
      <style>{TWEAKS_CSS}</style>
      <div ref={ref} className="twk-panel" style={{ right: off.current.x, bottom: off.current.y }}>
        <div className="twk-hd" onMouseDown={onDrag}>
          <b>{title}</b>
          <button className="twk-x" onMouseDown={e=>e.stopPropagation()} onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}
const TweakSection = ({ label, children }) => <><div className="twk-sect">{label}</div>{children}</>;
const TweakSlider = ({ label, value, min=0, max=100, step=1, unit='', onChange }) => (
  <div className="twk-row">
    <div className="twk-lbl"><span>{label}</span><span className="twk-val">{value}{unit}</span></div>
    <input type="range" className="twk-slider" min={min} max={max} step={step} value={value} onChange={e=>onChange(Number(e.target.value))}/>
  </div>
);
const TweakToggle = ({ label, value, onChange }) => (
  <div className="twk-row twk-row-h">
    <div className="twk-lbl"><span>{label}</span></div>
    <button type="button" className="twk-toggle" data-on={value?'1':'0'} onClick={()=>onChange(!value)}><i/></button>
  </div>
);
const TweakRadio = ({ label, value, options, onChange }) => {
  const opts = options.map(o => typeof o==='object'?o:{value:o,label:o});
  const idx = Math.max(0, opts.findIndex(o=>o.value===value));
  const n = opts.length;
  return (
    <div className="twk-row">
      <div className="twk-lbl"><span>{label}</span></div>
      <div className="twk-seg">
        <div className="twk-seg-thumb" style={{left:`calc(2px + ${idx}*(100% - 4px)/${n})`,width:`calc((100% - 4px)/${n})`}}/>
        {opts.map(o=><button key={o.value} type="button" onClick={()=>onChange(o.value)}>{o.label}</button>)}
      </div>
    </div>
  );
};
const TweakColor = ({ label, value, onChange }) => (
  <div className="twk-row twk-row-h">
    <div className="twk-lbl"><span>{label}</span></div>
    <input type="color" className="twk-swatch" value={value} onChange={e=>onChange(e.target.value)}/>
  </div>
);

// ── STATUS BADGE ───────────────────────────────────────────────────────────────
const STATUS_META = {
  playing:   { label:"Playing",   color:"#22c55e", bg:"rgba(34,197,94,0.12)",  icon:"gamepad" },
  completed: { label:"Completed", color:"#7C3AED", bg:"rgba(124,58,237,0.12)", icon:"trophy" },

const StatusBadge = ({ status, size="sm" }) => {
  const m = STATUS_META[status] || STATUS_META.backlog;
  return (
    <span style={{ display:"inline-flex", alignItems:"center", gap:4, padding: size==="sm"?"3px 8px":"5px 12px", borderRadius:99, background:m.bg, color:m.color, fontSize: size==="sm"?11:13, fontWeight:600 }}>
      <Icon name={m.icon} size={size==="sm"?11:13}/>{m.label}
    </span>

};

const StarRating = ({ value, onChange, readOnly=false }) => (
  <div style={{ display:"flex", gap:2 }}>
    {[1,2,3,4,5].map(i => (
      <span key={i} onClick={() => !readOnly && onChange && onChange(i)}
        style={{ cursor:readOnly?"default":"pointer", color:i<=value?"#f59e0b":"rgba(255,255,255,0.15)", fontSize:14 }}>★</span>
    ))}
  </div>
);

const GlassCard = ({ children, style, onClick }) => {
  const [hov, setHov] = useState(false);
  return (
    <div onClick={onClick} onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)}
      style={{
        background: hov&&onClick
          ? "linear-gradient(135deg, rgba(45,48,85,1) 0%, rgba(32,34,62,1) 100%)"
          : "linear-gradient(135deg, rgba(30,32,60,1) 0%, rgba(20,22,44,1) 100%)",
        border:`1px solid ${hov?"rgba(124,58,237,0.5)":"rgba(124,58,237,0.2)"}`,
        borderRadius:14, transition:"all 0.2s", cursor:onClick?"pointer":"default",
        boxShadow: hov ? "0 8px 24px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.06)" : "0 2px 8px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.04)",
        ...style
      }}>
      {children}
    </div>
  );
};

const GameCard = ({ game, onOpen }) => {
  const [hov, setHov] = useState(false);
  const [imgErr, setImgErr] = useState(false);
  const colors = ["#1a0a2e","#0a1a2e","#0a2e1a","#2e1a0a","#1a1a2e"];
  const fallbackBg = colors[game.id % colors.length];
  return (
    <div onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)} onClick={()=>onOpen&&onOpen(game)}
      style={{ position:"relative", borderRadius:14, overflow:"hidden", aspectRatio:"2/3", cursor:"pointer", transform:hov?"translateY(-4px) scale(1.02)":"none", transition:"transform 0.2s, box-shadow 0.2s", boxShadow:hov?"0 16px 40px rgba(0,0,0,0.6),0 0 0 1px rgba(124,58,237,0.3)":"0 4px 16px rgba(0,0,0,0.4)" }}>
      {!imgErr ? (
        <img src={game.cover} alt={game.title} style={{ width:"100%", height:"100%", objectFit:"cover" }} onError={()=>setImgErr(true)}/>
      ) : (
        <div style={{ width:"100%", height:"100%", background:`linear-gradient(135deg, ${fallbackBg}, #0f0f1a)`, display:"flex", alignItems:"center", justifyContent:"center" }}>
          <div style={{ fontSize:32, opacity:0.3 }}>🎮</div>
        </div>
      )}
      <div style={{ position:"absolute", inset:0, background:hov?"linear-gradient(180deg,rgba(0,0,0,0.1) 0%,rgba(0,0,0,0.9) 70%)":"linear-gradient(180deg,rgba(0,0,0,0) 40%,rgba(0,0,0,0.9) 100%)", transition:"background 0.2s" }}/>
      <div style={{ position:"absolute", bottom:0, left:0, right:0, padding:"12px 10px 10px" }}>
        <div style={{ fontSize:13, fontWeight:700, color:"#fff", marginBottom:4, lineHeight:1.3 }}>{game.title}</div>
        <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between" }}>
          <StatusBadge status={game.status}/>
          {game.rating>0 && <div style={{ color:"#f59e0b", fontSize:11 }}>{"★".repeat(game.rating)}</div>}
        </div>
      </div>
      {game.metacritic>0 && (
        <div style={{ position:"absolute", top:8, right:8, background:game.metacritic>=90?"#22c55e":game.metacritic>=75?"#f59e0b":"#ef4444", color:"#000", borderRadius:6, padding:"2px 6px", fontSize:11, fontWeight:800 }}>{game.metacritic}</div>
      )}
    </div>
  );
};

const LibraryPage = ({ setSelectedGame, setPage }) => {
  const [filter, setFilter] = useState("all");
  const [search, setSearch] = useState("");
  const [view, setView] = useState("grid");
  const [sortBy, setSortBy] = useState("title");
  const [library, setLibrary] = useState(DATA.library);
  const [addOpen, setAddOpen] = useState(false);
  const [searchResults, setSearchResults] = useState([]);
  const [searchQuery, setSearchQuery] = useState("");

  const tabs = [
    { id:"all",       label:"All",       count:library.length },
    { id:"playing",   label:"Playing",   count:library.filter(g=>g.status==="playing").length },
    { id:"completed", label:"Completed", count:library.filter(g=>g.status==="completed").length },
    { id:"backlog",   label:"Backlog",   count:library.filter(g=>g.status==="backlog").length },
    { id:"dropped",   label:"Dropped",   count:library.filter(g=>g.status==="dropped").length },
  ];

  const filtered = useMemo(() => {
    let res = library;
    if (filter !== "all") res = res.filter(g=>g.status===filter);
    if (search) res = res.filter(g=>g.title.toLowerCase().includes(search.toLowerCase()));
    if (sortBy==="title") res=[...res].sort((a,b)=>a.title.localeCompare(b.title));
    if (sortBy==="rating") res=[...res].sort((a,b)=>b.rating-a.rating);
    if (sortBy==="hours") res=[...res].sort((a,b)=>b.hours-a.hours);
    if (sortBy==="metacritic") res=[...res].sort((a,b)=>b.metacritic-a.metacritic);
    return res;
  }, [library, filter, search, sortBy]);

  const handleSearch = useCallback((q) => {
    setSearchQuery(q);
    if (!q) { setSearchResults([]); return; }
    const mock = [
      { id:101, title:"Hollow Knight: Silksong", cover:"https://media.rawg.io/media/games/4cf/4cfc6b7f1850590a4634b08bfab308ab.jpg", metacritic:0, year:2024 },
      { id:102, title:"Black Myth: Wukong",      cover:"https://media.rawg.io/media/games/b29/b294fdd866dcdb643e7bab370a552855.jpg", metacritic:82, year:2024 },
      { id:103, title:"Palworld",                cover:"https://media.rawg.io/media/games/479/479c2b8ba9370eff7bb7a5a0ab8c80b0.jpg", metacritic:73, year:2024 },
    ].filter(g=>g.title.toLowerCase().includes(q.toLowerCase()));
    setSearchResults(mock);
  }, []);

  const addGame = game => {
    setLibrary(prev=>[{ ...game, status:"backlog", rating:0, hours:0, genre:["Unknown"], platform:"Steam" }, ...prev]);
    setAddOpen(false); setSearchQuery(""); setSearchResults([]);
  };

  return (
    <div>
      <TopBar title="My Library" subtitle={`${library.length} games tracked`} searchVal={search} onSearch={setSearch}
        actions={
          <button onClick={()=>setAddOpen(true)} style={{ display:"flex", alignItems:"center", gap:7, background:"linear-gradient(135deg,#7C3AED,#a855f7)", color:"#fff", padding:"8px 16px", borderRadius:10, fontSize:13, fontWeight:700, boxShadow:"0 4px 14px rgba(124,58,237,0.35)" }}>
            <Icon name="plus" size={15}/> Add Game
          </button>
        }/>

      <div style={{ display:"flex", gap:4, marginBottom:20, background:"rgba(14,15,26,0.5)", borderRadius:12, padding:4, border:"1px solid rgba(124,58,237,0.12)", width:"fit-content" }}>
        {tabs.map(t=>(
          <button key={t.id} onClick={()=>setFilter(t.id)}
            style={{ padding:"7px 14px", borderRadius:9, fontSize:13, fontWeight:filter===t.id?700:400, background:filter===t.id?"rgba(124,58,237,0.2)":"transparent", color:filter===t.id?"#c084fc":"var(--text3)", border:filter===t.id?"1px solid rgba(124,58,237,0.3)":"1px solid transparent", transition:"all 0.15s" }}>
            {t.label} <span style={{ opacity:0.6, fontSize:11, marginLeft:3 }}>{t.count}</span>
          </button>
        ))}
      </div>

      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:16 }}>
        <div style={{ fontSize:13, color:"var(--text3)" }}>{filtered.length} games</div>
        <div style={{ display:"flex", gap:8, alignItems:"center" }}>
          <select value={sortBy} onChange={e=>setSortBy(e.target.value)}
            style={{ background:"rgba(14,15,26,0.8)", border:"1px solid rgba(124,58,237,0.15)", borderRadius:8, padding:"5px 10px", color:"var(--text2)", fontSize:12, outline:"none" }}>
            <option value="title">Title A–Z</option>
            <option value="rating">Rating</option>
            <option value="hours">Hours</option>
            <option value="metacritic">Metacritic</option>
          </select>
          {["grid","list"].map(v=>(
            <button key={v} onClick={()=>setView(v)} style={{ padding:6, borderRadius:7, background:view===v?"rgba(124,58,237,0.2)":"transparent", color:view===v?"#a855f7":"var(--text3)" }}>
              <Icon name={v} size={15}/>
            </button>
          ))}
        </div>
      </div>

      {view==="grid" ? (
        <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(140px,1fr))", gap:14 }}>
          {filtered.map(g=><GameCard key={g.id} game={g} onOpen={game=>{setSelectedGame(game);setPage("gameDetail");}}/>)}
        </div>
      ) : (
        <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
          {filtered.map(g=>(
            <GlassCard key={g.id} style={{ padding:"12px 16px", display:"flex", alignItems:"center", gap:14 }} onClick={()=>{setSelectedGame(g);setPage("gameDetail");}}>
              <img src={g.cover} alt={g.title} style={{ width:48, height:64, objectFit:"cover", borderRadius:8, flexShrink:0 }}/>
              <div style={{ flex:1, minWidth:0 }}>
                <div style={{ fontWeight:700, fontSize:14, marginBottom:4 }}>{g.title}</div>
                <div style={{ display:"flex", gap:8, flexWrap:"wrap", alignItems:"center" }}>
                  <StatusBadge status={g.status}/>
                  {g.genre.map(ge=><span key={ge} style={{ fontSize:11, color:"var(--text3)", background:"rgba(255,255,255,0.05)", borderRadius:4, padding:"1px 6px" }}>{ge}</span>)}
                </div>
              </div>
              <div style={{ display:"flex", gap:16, alignItems:"center", flexShrink:0 }}>
                {g.metacritic>0&&<div style={{ background:g.metacritic>=90?"#22c55e":g.metacritic>=75?"#f59e0b":"#ef4444", color:"#000", borderRadius:6, padding:"2px 7px", fontSize:11, fontWeight:800 }}>{g.metacritic}</div>}
                {g.hours>0&&<div style={{ fontSize:12, color:"var(--text3)" }}>{g.hours}h</div>}
                <StarRating value={g.rating} readOnly/>
                <Icon name="chevronRight" size={14} style={{ color:"var(--text3)" }}/>
              </div>
            </GlassCard>
          ))}
        </div>
      )}

      {addOpen && (
        <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.7)", backdropFilter:"blur(8px)", display:"flex", alignItems:"center", justifyContent:"center", zIndex:100 }}
          onClick={e=>e.target===e.currentTarget&&setAddOpen(false)}>
          <GlassCard style={{ width:480, padding:28, border:"1px solid rgba(124,58,237,0.3)" }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:20 }}>
              <h3 style={{ fontFamily:"var(--font2)", fontWeight:700, fontSize:18 }}>게임 추가</h3>
              <button onClick={()=>setAddOpen(false)}><Icon name="x" size={18} style={{ color:"var(--text3)" }}/></button>
            </div>
            <div style={{ position:"relative", marginBottom:16 }}>
              <Icon name="search" size={15} style={{ position:"absolute", left:12, top:"50%", transform:"translateY(-50%)", color:"var(--text3)" }}/>
              <input value={searchQuery} onChange={e=>handleSearch(e.target.value)} placeholder="RAWG에서 게임 검색…"
                style={{ width:"100%", background:"rgba(8,9,15,0.8)", border:"1px solid rgba(124,58,237,0.25)", borderRadius:10, padding:"10px 12px 10px 36px", color:"var(--text)", fontSize:14, outline:"none" }}/>
            </div>
            {searchResults.length>0 && (
              <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
                {searchResults.map(g=>(
                  <div key={g.id} onClick={()=>addGame(g)}
                    style={{ display:"flex", alignItems:"center", gap:12, padding:"10px 12px", background:"rgba(124,58,237,0.06)", border:"1px solid rgba(124,58,237,0.12)", borderRadius:10, cursor:"pointer" }}>
                    <img src={g.cover} alt={g.title} style={{ width:36, height:48, objectFit:"cover", borderRadius:6 }}/>
                    <div style={{ flex:1 }}>
                      <div style={{ fontWeight:600, fontSize:14 }}>{g.title}</div>
                      <div style={{ fontSize:12, color:"var(--text3)" }}>{g.year}{g.metacritic>0?` · MC ${g.metacritic}`:" · TBD"}</div>
                    </div>
                    <Icon name="plus" size={16} style={{ color:"#a855f7" }}/>
                  </div>
                ))}
              </div>
            )}
            {searchQuery && searchResults.length===0 && <div style={{ textAlign:"center", color:"var(--text3)", padding:"20px 0", fontSize:13 }}>No results. Try another title.</div>}
            {!searchQuery && (
              <div style={{ display:"flex", flexDirection:"column", gap:6, fontSize:13, color:"var(--text3)" }}>
                <div>💡 <strong style={{ color:"var(--text2)" }}>RAWG API</strong> 연동으로 게임 데이터를 자동으로 불러옵니다</div>
                <div>· 게임 제목, 포스터, 장르, 메타스코어 자동 파싱</div>
              </div>
            )}
          </GlassCard>
        </div>
      )}
    </div>
  );
};

        <div style={{ fontSize:14, fontWeight:700, color:"var(--text2)", marginBottom:12, display:"flex", alignItems:"center", gap:8 }}>
          <Icon name="star" size={14} style={{ color:"#f59e0b" }}/> Top Rated Games (★★★★★)
        </div>
        <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(130px,1fr))", gap:12 }}>
          {topGames.map(g=>(
            <div key={g.id} style={{ borderRadius:12, overflow:"hidden", aspectRatio:"2/3", position:"relative" }}>
              <img src={g.cover} alt={g.title} style={{ width:"100%", height:"100%", objectFit:"cover" }}/>
              <div style={{ position:"absolute", inset:0, background:"linear-gradient(180deg,transparent 50%,rgba(0,0,0,0.85))" }}/>
              <div style={{ position:"absolute", bottom:8, left:8, right:8, fontSize:11, fontWeight:700, color:"#fff" }}>{g.title}</div>
            </div>
          ))}
        </div>
      </div>
      <GlassCard style={{ padding:"20px 24px", display:"flex", alignItems:"center", gap:16 }}>
        <div style={{ flex:1 }}>
          <div style={{ fontWeight:700, marginBottom:4 }}>공개 프로필 링크</div>
          <div style={{ fontSize:13, color:"var(--accent2)", fontFamily:"monospace" }}>gamestack.com/{user.id}</div>
        </div>
        <button style={{ display:"flex", alignItems:"center", gap:7, background:"linear-gradient(135deg,#7C3AED,#a855f7)", color:"#fff", padding:"9px 18px", borderRadius:10, fontSize:13, fontWeight:700 }}>
          <Icon name="externalLink" size={14}/> 공유하기
        </button>
      </GlassCard>
    </div>
  );
};

const LFGPage = () => {
  const [posts, setPosts] = useState(DATA.lfgPosts);
  const [createOpen, setCreateOpen] = useState(false);
  const [form, setForm] = useState({ game:"", type:"Co-op", desc:"" });
  const [filter, setFilter] = useState("all");

  const submit = () => {
    if (!form.game || !form.desc) return;
    setPosts(prev=>[{ id:Date.now(), user:"nova_striker", game:form.game, type:form.type, desc:form.desc, online:true, tags:[], time:"방금" }, ...prev]);
    setCreateOpen(false); setForm({ game:"", type:"Co-op", desc:"" });
  };

  return (
    <div>
      <TopBar title="Team-up · LFG" subtitle="실시간으로 같이 게임할 팀원을 찾아보세요"
        actions={
          <button onClick={()=>setCreateOpen(true)} style={{ display:"flex", alignItems:"center", gap:7, background:"linear-gradient(135deg,#7C3AED,#a855f7)", color:"#fff", padding:"8px 16px", borderRadius:10, fontSize:13, fontWeight:700 }}>
            <Icon name="plus" size={15}/> 모집 올리기
          </button>
        }/>
      <div style={{ display:"flex", gap:6, marginBottom:20, flexWrap:"wrap", alignItems:"center" }}>
        {["all","Co-op","Party","Casual","Hunt","Guide"].map(f=>(
          <button key={f} onClick={()=>setFilter(f)}
            style={{ padding:"6px 14px", borderRadius:20, fontSize:12, fontWeight:600, background:filter===f?"rgba(124,58,237,0.2)":"rgba(255,255,255,0.04)", border:filter===f?"1px solid rgba(124,58,237,0.35)":"1px solid rgba(255,255,255,0.08)", color:filter===f?"#c084fc":"var(--text3)", transition:"all 0.15s" }}>
            {f==="all"?"전체":f}
          </button>
        ))}
        <div style={{ marginLeft:"auto", display:"flex", alignItems:"center", gap:6, fontSize:12, color:"var(--text3)" }}>
          <div style={{ width:7, height:7, borderRadius:"50%", background:"#22c55e", boxShadow:"0 0 6px #22c55e" }}/>
          {posts.filter(p=>p.online).length} online now
        </div>
      </div>
      <div style={{ display:"flex", flexDirection:"column", gap:12 }}>
        {posts.filter(p=>filter==="all"||p.type===filter).map(p=>(
          <GlassCard key={p.id} style={{ padding:"18px 20px" }}>
            <div style={{ display:"flex", gap:14, alignItems:"flex-start" }}>
              <div style={{ position:"relative", flexShrink:0 }}>
                <Avatar name={p.user} size={42}/>
                {p.online&&<div style={{ position:"absolute", bottom:1, right:1, width:10, height:10, borderRadius:"50%", background:"#22c55e", border:"2px solid #0e0f1a", boxShadow:"0 0 6px #22c55e" }}/>}
              </div>
              <div style={{ flex:1, minWidth:0 }}>
                <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:6 }}>
                  <span style={{ fontWeight:700, fontSize:14 }}>{p.user}</span>
                  <span style={{ background:"rgba(124,58,237,0.12)", border:"1px solid rgba(124,58,237,0.2)", borderRadius:6, padding:"2px 8px", fontSize:11, color:"#a855f7", fontWeight:600 }}>{p.type}</span>
                  <span style={{ fontSize:11, color:"var(--text3)", marginLeft:"auto" }}>{p.time}</span>
                </div>
                <div style={{ fontWeight:700, fontSize:15, color:"var(--accent3)", marginBottom:4 }}>🎮 {p.game}</div>
                <div style={{ fontSize:13, color:"var(--text2)", lineHeight:1.6, marginBottom:8 }}>{p.desc}</div>
                <div style={{ display:"flex", gap:6, alignItems:"center" }}>
                  {p.tags.map(t=><span key={t} style={{ background:"rgba(255,255,255,0.05)", borderRadius:4, padding:"2px 7px", fontSize:11, color:"var(--text3)" }}>#{t}</span>)}
                  <button style={{ marginLeft:"auto", background:"linear-gradient(135deg,#7C3AED,#a855f7)", color:"#fff", padding:"7px 16px", borderRadius:8, fontSize:12, fontWeight:700 }}>참여하기</button>
                </div>
              </div>
            </div>
          </GlassCard>
        ))}
      </div>
      {createOpen && (
        <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.75)", backdropFilter:"blur(8px)", display:"flex", alignItems:"center", justifyContent:"center", zIndex:100 }}
          onClick={e=>e.target===e.currentTarget&&setCreateOpen(false)}>
          <GlassCard style={{ width:480, padding:28, border:"1px solid rgba(124,58,237,0.3)" }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:20 }}>
              <h3 style={{ fontFamily:"var(--font2)", fontWeight:700, fontSize:18 }}>팀원 모집하기</h3>
              <button onClick={()=>setCreateOpen(false)}><Icon name="x" size={18} style={{ color:"var(--text3)" }}/></button>
            </div>
            <div style={{ marginBottom:14 }}>
              <label style={{ display:"block", fontSize:12, color:"var(--text3)", marginBottom:5, fontWeight:600 }}>게임 이름</label>
              <input value={form.game} onChange={e=>setForm(p=>({...p,game:e.target.value}))} placeholder="예: Elden Ring"
                style={{ width:"100%", background:"rgba(8,9,15,0.8)", border:"1px solid rgba(124,58,237,0.2)", borderRadius:9, padding:"9px 12px", color:"var(--text)", fontSize:13, outline:"none" }}/>
            </div>
            <div style={{ marginBottom:14 }}>
              <label style={{ display:"block", fontSize:12, color:"var(--text3)", marginBottom:5, fontWeight:600 }}>타입</label>
              <div style={{ display:"flex", gap:6, flexWrap:"wrap" }}>
                {["Co-op","Party","Casual","Hunt","Guide"].map(t=>(
                  <button key={t} onClick={()=>setForm(p=>({...p,type:t}))}
                    style={{ padding:"5px 12px", borderRadius:20, fontSize:12, fontWeight:600, background:form.type===t?"rgba(124,58,237,0.2)":"transparent", border:form.type===t?"1px solid rgba(124,58,237,0.4)":"1px solid rgba(255,255,255,0.1)", color:form.type===t?"#c084fc":"var(--text3)" }}>
                    {t}
                  </button>
                ))}
              </div>
            </div>
            <div style={{ marginBottom:20 }}>
              <label style={{ display:"block", fontSize:12, color:"var(--text3)", marginBottom:5, fontWeight:600 }}>모집 내용</label>
              <textarea value={form.desc} onChange={e=>setForm(p=>({...p,desc:e.target.value}))} placeholder="어떤 팀원을 찾고 있나요?"
                style={{ width:"100%", background:"rgba(8,9,15,0.8)", border:"1px solid rgba(124,58,237,0.2)", borderRadius:9, padding:"9px 12px", color:"var(--text)", fontSize:13, outline:"none", resize:"vertical", minHeight:80 }}/>
            </div>
            <button onClick={submit} style={{ width:"100%", background:"linear-gradient(135deg,#7C3AED,#a855f7)", color:"#fff", padding:"11px", borderRadius:10, fontWeight:700, fontSize:14 }}>게시하기</button>
          </GlassCard>
        </div>
      )}
    </div>
  );
};

const StatsPage = () => {
  const { genreStats, monthlyHours, user } = DATA;
  const maxH = Math.max(...genreStats.map(g=>g.hours));
  const maxM = Math.max(...monthlyHours.map(m=>m.hours));
  const cr = Math.round((user.stats.completed/user.stats.totalGames)*100);
  return (
    <div>
      <TopBar title="Play Stats" subtitle={`${user.stats.totalGames}개 게임 · ${user.stats.totalHours.toLocaleString()}시간 기록`}/>
      <div style={{ display:"grid", gridTemplateColumns:"repeat(4,1fr)", gap:12, marginBottom:24 }}>
        <StatCard label="Total Hours" value={`${user.stats.totalHours.toLocaleString()}h`} icon="clock" color="#7C3AED"/>
        <StatCard label="Completion Rate" value={`${cr}%`} icon="trophy" color="#22c55e" sub={`${user.stats.completed} of ${user.stats.totalGames}`}/>
        <StatCard label="Avg per Game" value={`${Math.round(user.stats.totalHours/user.stats.totalGames)}h`} icon="fire" color="#f59e0b"/>
        <StatCard label="Backlog Debt" value={user.stats.backlog} icon="bookmark" color="#ef4444"/>
      </div>
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:20, marginBottom:20 }}>
        <GlassCard style={{ padding:"22px" }}>
          <div style={{ fontWeight:700, fontFamily:"var(--font2)", marginBottom:18, fontSize:15, display:"flex", alignItems:"center", gap:8 }}>
            <Icon name="stats" size={15} style={{ color:"#a855f7" }}/> Genre Breakdown
          </div>
          <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
            {genreStats.map(g=>(
              <div key={g.genre}>
                <div style={{ display:"flex", justifyContent:"space-between", marginBottom:4 }}>
                  <span style={{ fontSize:13, fontWeight:600, color:"var(--text2)" }}>{g.genre}</span>
                  <span style={{ fontSize:12, color:"var(--text3)" }}>{g.hours}h · {g.count} games</span>
                </div>
                <div style={{ height:6, background:"rgba(255,255,255,0.06)", borderRadius:99, overflow:"hidden" }}>
                  <div style={{ height:"100%", width:`${(g.hours/maxH)*100}%`, background:`linear-gradient(90deg,${g.color},${g.color}88)`, borderRadius:99, transition:"width 0.8s ease" }}/>
                </div>
              </div>
            ))}
          </div>
        </GlassCard>
        <GlassCard style={{ padding:"22px" }}>
          <div style={{ fontWeight:700, fontFamily:"var(--font2)", marginBottom:18, fontSize:15 }}>Monthly Hours (6mo)</div>
          <div style={{ display:"flex", alignItems:"flex-end", gap:10, height:160, paddingBottom:24, position:"relative" }}>
            {monthlyHours.map(m=>(
              <div key={m.month} style={{ flex:1, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"flex-end", height:"100%", position:"relative" }}>
                <div style={{ fontSize:11, color:"var(--text2)", fontWeight:600, marginBottom:4 }}>{m.hours}</div>
                <div style={{ width:"100%", background:"linear-gradient(180deg,#7C3AED,#a855f7aa)", borderRadius:"6px 6px 0 0", height:`${(m.hours/maxM)*130}px`, minHeight:4 }}/>
                <div style={{ position:"absolute", bottom:0, fontSize:11, color:"var(--text3)" }}>{m.month}</div>
              </div>
            ))}
          </div>
        </GlassCard>
      </div>
      <GlassCard style={{ padding:"22px" }}>
        <div style={{ fontWeight:700, fontFamily:"var(--font2)", marginBottom:16, fontSize:15 }}>Library Status</div>
        <div style={{ display:"grid", gridTemplateColumns:"repeat(4,1fr)", gap:12 }}>
          {[
            { key:"playing",   label:"Playing",   value:user.stats.playing,   color:"#22c55e", icon:"gamepad" },
            { key:"completed", label:"Completed", value:user.stats.completed, color:"#7C3AED", icon:"trophy" },
            { key:"backlog",   label:"Backlog",   value:user.stats.backlog,   color:"#f59e0b", icon:"bookmark" },
            { key:"dropped",   label:"Dropped",   value:user.stats.dropped,   color:"#ef4444", icon:"x" },
          ].map(s=>{
            const pct = Math.round((s.value/user.stats.totalGames)*100);
            return (
              <div key={s.key} style={{ background:"rgba(255,255,255,0.03)", border:"1px solid rgba(255,255,255,0.06)", borderRadius:12, padding:"16px", textAlign:"center" }}>
                <Icon name={s.icon} size={20} style={{ color:s.color, margin:"0 auto 10px" }}/>
                <div style={{ fontFamily:"var(--font2)", fontWeight:800, fontSize:28, letterSpacing:"-0.03em", color:s.color }}>{s.value}</div>
                <div style={{ fontSize:12, color:"var(--text2)", fontWeight:600, marginBottom:6 }}>{s.label}</div>
                <div style={{ height:4, background:"rgba(255,255,255,0.06)", borderRadius:99, overflow:"hidden" }}>
                  <div style={{ height:"100%", width:`${pct}%`, background:s.color, borderRadius:99 }}/>
                </div>
                <div style={{ fontSize:11, color:"var(--text3)", marginTop:4 }}>{pct}%</div>
              </div>
            );
          })}
        </div>
      </GlassCard>
    </div>
  );
};

const GameDetailPage = ({ game, goBack }) => {
  const [rating, setRating] = useState(game?.rating||0);
  const [status, setStatus] = useState(game?.status||"backlog");
  const [review, setReview] = useState("");
  if (!game) return <div style={{ padding:40, color:"var(--text3)" }}>No game selected.</div>;
  const sm = STATUS_META[status];
  return (
    <div>
      <button onClick={goBack} style={{ display:"flex", alignItems:"center", gap:6, color:"var(--text3)", fontSize:13, marginBottom:20 }}>
        <Icon name="chevronLeft" size={15}/> Back to Library
      </button>
      <div style={{ position:"relative", borderRadius:20, overflow:"hidden", marginBottom:24, height:260 }}>
        <img src={game.cover} alt={game.title} style={{ width:"100%", height:"100%", objectFit:"cover" }}/>
        <div style={{ position:"absolute", inset:0, background:"linear-gradient(90deg,rgba(8,9,15,0.95) 30%,rgba(8,9,15,0.4))" }}/>
        <div style={{ position:"absolute", inset:0, padding:"32px" }}>
          <div style={{ display:"flex", gap:8, marginBottom:12, flexWrap:"wrap" }}>
            {game.genre.map(g=><span key={g} style={{ background:"rgba(124,58,237,0.2)", border:"1px solid rgba(124,58,237,0.3)", borderRadius:6, padding:"3px 10px", fontSize:12, color:"#c084fc" }}>{g}</span>)}
          </div>
          <h1 style={{ fontFamily:"var(--font2)", fontWeight:800, fontSize:32, letterSpacing:"-0.03em", marginBottom:10 }}>{game.title}</h1>
          <div style={{ display:"flex", gap:14, alignItems:"center", flexWrap:"wrap" }}>
            <StatusBadge status={status} size="lg"/>
            {game.metacritic>0&&<div style={{ background:game.metacritic>=90?"#22c55e":game.metacritic>=75?"#f59e0b":"#ef4444", color:"#000", borderRadius:8, padding:"4px 10px", fontSize:14, fontWeight:800 }}>MC {game.metacritic}</div>}
            {game.hours>0&&<span style={{ fontSize:13, color:"var(--text2)" }}>⏱ {game.hours}h played</span>}
            <span style={{ fontSize:13, color:"var(--text2)" }}>{game.platform}</span>
          </div>
        </div>
      </div>
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:14, marginBottom:24 }}>
        <GlassCard style={{ padding:"18px 20px" }}>
          <div style={{ fontSize:12, color:"var(--text3)", fontWeight:600, marginBottom:10 }}>STATUS</div>
          <div style={{ display:"flex", gap:6, flexWrap:"wrap" }}>
            {Object.entries(STATUS_META).map(([k,v])=>(
              <button key={k} onClick={()=>setStatus(k)}
                style={{ padding:"6px 12px", borderRadius:8, fontSize:12, fontWeight:600, background:status===k?v.bg:"transparent", border:`1px solid ${status===k?v.color+"55":"rgba(255,255,255,0.08)"}`, color:status===k?v.color:"var(--text3)", transition:"all 0.15s" }}>
                {v.label}
              </button>
            ))}
          </div>
        </GlassCard>
        <GlassCard style={{ padding:"18px 20px" }}>
          <div style={{ fontSize:12, color:"var(--text3)", fontWeight:600, marginBottom:10 }}>YOUR RATING</div>
          <div style={{ display:"flex", alignItems:"center", gap:12 }}>
            <StarRating value={rating} onChange={setRating}/>
            <span style={{ fontSize:13, color:"var(--text2)" }}>{rating>0?["","Terrible","Bad","Okay","Good","Amazing"][rating]:"Rate this game"}</span>
          </div>
        </GlassCard>
      </div>
      <GlassCard style={{ padding:"20px" }}>
        <div style={{ fontSize:13, fontWeight:700, marginBottom:10, color:"var(--text2)" }}>Write a Review</div>
        <textarea value={review} onChange={e=>setReview(e.target.value)} placeholder="이 게임에 대한 생각을 남겨보세요…"
          style={{ width:"100%", background:"rgba(8,9,15,0.5)", border:"1px solid rgba(124,58,237,0.15)", borderRadius:10, padding:"10px 14px", color:"var(--text)", fontSize:13, outline:"none", resize:"vertical", minHeight:90 }}/>
        <div style={{ display:"flex", justifyContent:"flex-end", marginTop:10 }}>
          <button style={{ background:"linear-gradient(135deg,#7C3AED,#a855f7)", color:"#fff", padding:"8px 20px", borderRadius:9, fontSize:13, fontWeight:700 }}>저장</button>
        </div>
      </GlassCard>
    </div>
  );
};

// ── APP ROOT ──────────────────────────────────────────────────────────────────
const App = () => {
  const [page, setPage] = useState("landing");
  const [selectedGame, setSelectedGame] = useState(null);
  const { tweaks, setTweak } = useTweaks(TWEAK_DEFAULTS);

  useEffect(() => {
    document.documentElement.style.setProperty("--accent", tweaks.accentColor);
    document.documentElement.style.setProperty("--accent2", tweaks.accentColor2);
    document.documentElement.style.setProperty("--font", `'${tweaks.fontFamily}', sans-serif`);
  }, [tweaks]);

  if (page === "landing") return (
    <>
      <LandingPage onEnter={()=>setPage("dashboard")}/>
      <TweaksPanel>
        <TweakSection label="Colors">
          <TweakColor label="Primary Accent" value={tweaks.accentColor} onChange={v=>setTweak("accentColor",v)}/>
          <TweakColor label="Secondary Accent" value={tweaks.accentColor2} onChange={v=>setTweak("accentColor2",v)}/>
        </TweakSection>
        <TweakSection label="Layout">
          <TweakSlider label="Glass Blur" value={tweaks.glassBlur} min={4} max={32} step={2} onChange={v=>setTweak("glassBlur",v)}/>
          <TweakToggle label="Animations" value={tweaks.showAnimations} onChange={v=>setTweak("showAnimations",v)}/>
        </TweakSection>
      </TweaksPanel>
    </>
  );

  return (
    <div style={{ display:"flex", minHeight:"100vh" }}>
      <Sidebar page={page==="gameDetail"?"library":page} setPage={setPage}/>
      <main style={{ flex:1, padding:"32px 36px", overflowY:"auto" }}>
        {page==="dashboard"  && <Dashboard setPage={setPage} setSelectedGame={setSelectedGame}/>}
        {page==="library"    && <LibraryPage setSelectedGame={setSelectedGame} setPage={setPage}/>}
        {page==="profile"    && <ProfilePage/>}
        {page==="lfg"        && <LFGPage/>}
        {page==="stats"      && <StatsPage/>}
        {page==="gameDetail" && <GameDetailPage game={selectedGame} goBack={()=>setPage("library")}/>}
      </main>
      <TweaksPanel>
        <TweakSection label="Colors">
          <TweakColor label="Primary Accent" value={tweaks.accentColor} onChange={v=>setTweak("accentColor",v)}/>
          <TweakColor label="Secondary Accent" value={tweaks.accentColor2} onChange={v=>setTweak("accentColor2",v)}/>
        </TweakSection>
        <TweakSection label="Layout">
          <TweakSlider label="Glass Blur" value={tweaks.glassBlur} min={4} max={32} step={2} onChange={v=>setTweak("glassBlur",v)}/>
          <TweakToggle label="Animations" value={tweaks.showAnimations} onChange={v=>setTweak("showAnimations",v)}/>
          <TweakToggle label="Compact Mode" value={tweaks.compactMode} onChange={v=>setTweak("compactMode",v)}/>
        </TweakSection>
        <TweakSection label="Typography">
          <TweakRadio label="Font" value={tweaks.fontFamily}
            options={[{label:"Jakarta",value:"Plus Jakarta Sans"},{label:"Grotesk",value:"Space Grotesk"},{label:"Outfit",value:"Outfit"}]}
            onChange={v=>setTweak("fontFamily",v)}/>
        </TweakSection>
      </TweaksPanel>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
